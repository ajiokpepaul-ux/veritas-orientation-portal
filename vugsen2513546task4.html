<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4: Change List Item Markers</title>
</head>
    <h4>Unordered List with Circle Markers</h4>
    <ul style="list-style-type: circle;">
        <li>Notebook</li>
        <li>Pen</li>
        <li>Textbook</li>
        <li>Highlighter</li>
    </ul>

    <h4>Unordered List with Square Markers</h4>
    <ul style="list-style-type: square;">
        <li>Laptop</li>
        <li>Backpack</li>
        <li>Calculator</li>
        <li>Water Bottle</li>
    </ul>

    <h4>Unordered List with No Markers</h4>
    <ul style="list-style-type: none;">
        <li>Student ID Card</li>
        <li>Library Card</li>
        <li>USB Drive</li>
        <li>Headphones</li>
    </ul>

</body>
</html>
